name: Automated CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  detect:
    name: Detect Project Type
    runs-on: ubuntu-latest
    outputs:
      has_node: ${{ steps.detect.outputs.has_node }}
      has_typescript: ${{ steps.detect.outputs.has_typescript }}
      has_python: ${{ steps.detect.outputs.has_python }}
      has_html: ${{ steps.detect.outputs.has_html }}
      has_markdown: ${{ steps.detect.outputs.has_markdown }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect project type
        id: detect
        run: |
          if [ -f "package.json" ]; then
            echo "has_node=true" >> "$GITHUB_OUTPUT"
            if [ -f "tsconfig.json" ] || grep -q '"typescript"' package.json 2>/dev/null; then
              echo "has_typescript=true" >> "$GITHUB_OUTPUT"
            fi
          fi
          if [ -f "pyproject.toml" ] || [ -f "requirements.txt" ] || [ -f "setup.py" ] || [ -f "Pipfile" ]; then
            echo "has_python=true" >> "$GITHUB_OUTPUT"
          fi
          if find . -maxdepth 3 -name "*.html" -not -path "*/node_modules/*" -not -path "*/.git/*" | head -1 | grep -q .; then
            echo "has_html=true" >> "$GITHUB_OUTPUT"
          fi
          if find . -maxdepth 3 -name "*.md" -not -path "*/node_modules/*" -not -path "*/.git/*" | head -1 | grep -q .; then
            echo "has_markdown=true" >> "$GITHUB_OUTPUT"
          fi

  lint-and-test:
    name: Lint, Test & Security
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Node.js / TypeScript ──
      - name: Setup Node.js
        if: needs.detect.outputs.has_node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        if: needs.detect.outputs.has_node == 'true'
        run: |
          if [ -f "package-lock.json" ]; then npm ci;
          elif [ -f "yarn.lock" ]; then yarn install --frozen-lockfile;
          elif [ -f "pnpm-lock.yaml" ]; then npm i -g pnpm && pnpm install --frozen-lockfile;
          else npm install; fi

      - name: Lint (Node)
        if: needs.detect.outputs.has_node == 'true'
        run: |
          if npm run lint --if-present 2>/dev/null; then
            echo "Lint passed"
          else
            echo "::warning::Lint completed with issues"
          fi
        continue-on-error: true

      - name: Type Check
        if: needs.detect.outputs.has_typescript == 'true'
        run: npx tsc --noEmit 2>/dev/null || echo "::warning::Type check completed with issues"
        continue-on-error: true

      - name: Test (Node)
        if: needs.detect.outputs.has_node == 'true'
        run: npm test --if-present 2>/dev/null || echo "No tests configured"
        continue-on-error: true

      - name: Security Audit (npm)
        if: needs.detect.outputs.has_node == 'true'
        run: npm audit --audit-level=high 2>/dev/null || echo "::warning::npm audit found vulnerabilities"
        continue-on-error: true

      - name: Build
        if: needs.detect.outputs.has_node == 'true'
        run: npm run build --if-present 2>/dev/null || echo "No build script"
        continue-on-error: true

      # ── Python ──
      - name: Setup Python
        if: needs.detect.outputs.has_python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        if: needs.detect.outputs.has_python == 'true'
        run: |
          pip install --upgrade pip
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi
          if [ -f "pyproject.toml" ]; then pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || true; fi
          pip install ruff pip-audit 2>/dev/null || true

      - name: Lint (ruff)
        if: needs.detect.outputs.has_python == 'true'
        run: ruff check . 2>/dev/null || echo "::warning::Ruff found issues"
        continue-on-error: true

      - name: Test (pytest)
        if: needs.detect.outputs.has_python == 'true'
        run: python -m pytest --tb=short 2>/dev/null || echo "No tests configured"
        continue-on-error: true

      - name: Security Audit (pip)
        if: needs.detect.outputs.has_python == 'true'
        run: pip-audit 2>/dev/null || echo "::warning::pip-audit found vulnerabilities"
        continue-on-error: true

      # ── HTML Validation ──
      - name: Validate HTML
        if: needs.detect.outputs.has_html == 'true'
        run: |
          npm install -g htmlhint 2>/dev/null
          htmlhint "**/*.html" --ignore "node_modules/**" 2>/dev/null || echo "::warning::HTML issues found"
        continue-on-error: true

      # ── Markdown Link Check ──
      - name: Check Markdown Links
        if: needs.detect.outputs.has_markdown == 'true'
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
        continue-on-error: true

  security-scan:
    name: Security Scan
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for hardcoded secrets
        run: |
          echo "## Secret Scan Results" >> "$GITHUB_STEP_SUMMARY"
          FOUND=0
          for pattern in "AKIA[0-9A-Z]{16}" "ghp_[a-zA-Z0-9]{36}" "sk-[a-zA-Z0-9]{48}" "-----BEGIN (RSA |EC |DSA )?PRIVATE KEY"; do
            if git grep -rn -E "$pattern" -- ':!.github/' ':!*.yml' ':!*.yaml' 2>/dev/null; then
              FOUND=1
            fi
          done
          if [ "$FOUND" = "1" ]; then
            echo "::error::Potential secrets detected in repository"
            echo "- :warning: Potential secrets found" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- :white_check_mark: No hardcoded secrets detected" >> "$GITHUB_STEP_SUMMARY"
          fi
        continue-on-error: true

      - name: Check for sensitive files
        run: |
          SENSITIVE_FILES=".env .env.local .env.production credentials.json service-account.json"
          for f in $SENSITIVE_FILES; do
            if [ -f "$f" ]; then
              echo "::warning::Sensitive file found: $f"
            fi
          done
        continue-on-error: true

      - name: License check
        run: |
          if [ -f "LICENSE" ] || [ -f "LICENSE.md" ] || [ -f "LICENSE.txt" ]; then
            echo "License file found"
          else
            echo "::notice::No LICENSE file found — consider adding one"
          fi

  report:
    name: Pipeline Summary
    needs: [detect, lint-and-test, security-scan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate summary
        run: |
          echo "## CI/CD Pipeline Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Detection | ${{ needs.detect.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lint & Test | ${{ needs.lint-and-test.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Security Scan | ${{ needs.security-scan.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Detected:** Node=${{ needs.detect.outputs.has_node || 'no' }} | TS=${{ needs.detect.outputs.has_typescript || 'no' }} | Python=${{ needs.detect.outputs.has_python || 'no' }} | HTML=${{ needs.detect.outputs.has_html || 'no' }} | Markdown=${{ needs.detect.outputs.has_markdown || 'no' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_Ran at $(date -u '+%Y-%m-%d %H:%M UTC')_" >> "$GITHUB_STEP_SUMMARY"
