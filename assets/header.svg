<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 240" width="860" height="240" role="img" aria-label="Haley Ann Bird — Independent AI Inventor">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="30%" stop-color="#0d0221"/>
      <stop offset="70%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="glassName" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="50%" stop-color="#b794f4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6b21a8" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="glassTag" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.10"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glassBlur" x="-5%" y="-20%" width="110%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="70%" stop-color="#d8b4fe" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="860" height="240" fill="url(#bg)"/>
  <ellipse cx="430" cy="120" rx="340" ry="110" fill="#7c3aed" opacity="0.13" filter="url(#glassBlur)"/>

  <!-- Corner HUD brackets -->
  <line x1="24" y1="16" x2="24" y2="50" stroke="#9333ea" stroke-opacity="0.5" stroke-width="1.5"/>
  <line x1="16" y1="24" x2="50" y2="24" stroke="#9333ea" stroke-opacity="0.5" stroke-width="1.5"/>
  <line x1="836" y1="16" x2="836" y2="50" stroke="#9333ea" stroke-opacity="0.5" stroke-width="1.5"/>
  <line x1="810" y1="24" x2="844" y2="24" stroke="#9333ea" stroke-opacity="0.5" stroke-width="1.5"/>
  <line x1="24" y1="224" x2="24" y2="190" stroke="#9333ea" stroke-opacity="0.5" stroke-width="1.5"/>
  <line x1="16" y1="216" x2="50" y2="216" stroke="#9333ea" stroke-opacity="0.5" stroke-width="1.5"/>
  <line x1="836" y1="224" x2="836" y2="190" stroke="#9333ea" stroke-opacity="0.5" stroke-width="1.5"/>
  <line x1="810" y1="216" x2="844" y2="216" stroke="#9333ea" stroke-opacity="0.5" stroke-width="1.5"/>

  <!-- NAME GLASS PILL -->
  <rect x="130" y="44" width="600" height="72" rx="36" fill="#9333ea" opacity="0.28" filter="url(#glow)"/>
  <rect x="130" y="44" width="600" height="72" rx="36" fill="url(#glassName)"/>
  <rect x="130" y="44" width="600" height="72" rx="36" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.2"/>
  <rect x="150" y="45" width="560" height="2" rx="1" fill="url(#shimmer)" opacity="0.8"/>
  <text x="430" y="92" text-anchor="middle" dominant-baseline="middle"
    font-family="-apple-system,'SF Pro Display','Helvetica Neue',Arial,sans-serif"
    font-size="38" font-weight="700" letter-spacing="6" fill="#ffffff" opacity="0.97"
  >HALEY ANN BIRD</text>

  <!-- TAGLINE GLASS PILL -->
  <rect x="185" y="132" width="490" height="42" rx="21" fill="url(#glassTag)"/>
  <rect x="185" y="132" width="490" height="42" rx="21" fill="none" stroke="#d8b4fe" stroke-opacity="0.30" stroke-width="1"/>
  <rect x="205" y="133" width="450" height="1.5" rx="1" fill="url(#shimmer)" opacity="0.55"/>
  <text x="430" y="153" text-anchor="middle" dominant-baseline="middle"
    font-family="-apple-system,'SF Pro Text','Helvetica Neue',Arial,sans-serif"
    font-size="13" font-weight="500" letter-spacing="2.5" fill="#e9d5ff" opacity="0.95"
  >independent AI inventor  ·  NeuroCatalyst™  ·  Fishers, Indiana</text>

  <!-- STATUS MICRO-LINE -->
  <text x="430" y="202" text-anchor="middle"
    font-family="-apple-system,'SF Pro Text','Helvetica Neue',Arial,sans-serif"
    font-size="10" font-weight="400" letter-spacing="3" fill="#a78bfa" opacity="0.60"
  >9 INVENTIONS  ·  PRE-FILING  ·  2026</text>
</svg>